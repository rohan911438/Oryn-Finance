<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet Detection Test</title>
    <style>
        body {
            font-family: monospace;
            padding: 20px;
            background: #1a1a1a;
            color: #fff;
        }
        .result {
            background: #2a2a2a;
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
            border-left: 3px solid #4CAF50;
        }
        .error {
            border-left-color: #f44336;
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background: #45a049;
        }
    </style>
</head>
<body>
    <h1>Stellar Wallet Detection Test</h1>
    
    <button onclick="checkWallets()">Check Wallets</button>
    <button onclick="testFreighter()">Test Freighter Connection</button>
    <button onclick="testFighter()">Test Fighter Connection</button>
    
    <div id="output"></div>

    <script>
        function log(message, isError = false) {
            const output = document.getElementById('output');
            const div = document.createElement('div');
            div.className = 'result' + (isError ? ' error' : '');
            div.textContent = message;
            output.appendChild(div);
        }

        function checkWallets() {
            document.getElementById('output').innerHTML = '';
            
            log('=== Checking Window Object ===');
            
            // Check for freighter
            if (window.freighter) {
                log('✓ window.freighter is available');
                log('  Type: ' + typeof window.freighter);
                log('  Methods: ' + Object.keys(window.freighter).join(', '));
            } else {
                log('✗ window.freighter is NOT available', true);
            }
            
            // Check for fighter
            if (window.fighter) {
                log('✓ window.fighter is available');
                log('  Type: ' + typeof window.fighter);
                log('  Methods: ' + Object.keys(window.fighter).join(', '));
            } else {
                log('✗ window.fighter is NOT available', true);
            }
            
            // Check for other stellar-related objects
            const stellarKeys = Object.keys(window).filter(key => 
                key.toLowerCase().includes('stellar') || 
                key.toLowerCase().includes('freighter') ||
                key.toLowerCase().includes('fighter') ||
                key.toLowerCase().includes('wallet')
            );
            
            if (stellarKeys.length > 0) {
                log('Found stellar-related keys: ' + stellarKeys.join(', '));
            } else {
                log('No stellar-related keys found in window object');
            }
        }

        async function testFreighter() {
            document.getElementById('output').innerHTML = '';
            log('=== Testing Freighter Wallet ===');
            
            if (!window.freighter) {
                log('Freighter not found!', true);
                return;
            }
            
            try {
                log('Requesting public key...');
                const publicKey = await window.freighter.getPublicKey();
                log('✓ Success! Public Key: ' + publicKey);
                
                log('Getting network details...');
                const network = await window.freighter.getNetworkDetails();
                log('✓ Network: ' + network.networkPassphrase);
            } catch (error) {
                log('✗ Error: ' + error.message, true);
            }
        }

        async function testFighter() {
            document.getElementById('output').innerHTML = '';
            log('=== Testing Fighter Wallet ===');
            
            if (!window.fighter) {
                log('Fighter not found!', true);
                return;
            }
            
            try {
                log('Requesting public key...');
                const publicKey = await window.fighter.getPublicKey();
                log('✓ Success! Public Key: ' + publicKey);
                
                log('Getting network details...');
                const network = await window.fighter.getNetworkDetails();
                log('✓ Network: ' + network.networkPassphrase);
            } catch (error) {
                log('✗ Error: ' + error.message, true);
            }
        }

        // Auto-check on load
        window.addEventListener('load', () => {
            setTimeout(checkWallets, 500);
        });
    </script>
</body>
</html>
